<style>
    .body{
        margin: auto;
    }
    .input_field {
      width: 100%;
      padding: 12px 20px;
      margin: 8px 0;
      display: inline-block;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .input_submit {
      width: 100%;
      background-color: #4CAF50;
      color: white;
      padding: 14px 20px;
      margin: 8px 0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .input_submit:hover {
      background-color: #45a049;
    }
</style>

{% extends "base.html" %}
{% block body %}
    <div class="body">
        {% if error %}
            <h2>{{ error }}</h2>
        {% endif %}

        {% if success %}
            <h2>{{ success }}</h2>
        {% endif %}

        <form action="/delete" method="POST">
            <input type="hidden" name="step" value="search">
            <input type="number" name="id" placeholder="ID" class="input_field"> <br>
            <input type="submit" value="Find boat" class="input_submit">
        </form>
        {% if boat %}
            <h3>Found: {{ boat['name'] }} ({{ boat['type'] }})</h3>
            <form action="/delete" method="POST">
            <input type="hidden" name="step" value="confirm"> 
            <input type="hidden" name="id" value="{{ boat['id'] }}">
            <input type="submit" value="Confirm Delete" class="input_submit">
            </form>
            {% endif %}

    <!-- if no boat was found show a message -->
    {% if not_found %}
        <h3>No boat found with that ID.</h3>
    {% endif %}
    </div>
{% endblock %}
